<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Factory</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand fw-bold">🏭 App Factory</span>
<span class="text-white-50 small">Generate. Deploy. Done.</span>
</div>
</nav>
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow">
<div class="card-body p-4">
<h4 class="card-title mb-4">Create a New App</h4>
<form method="POST" action="/create" onsubmit="showLoading()">
<div class="mb-3">
<label class="form-label fw-bold">App Name</label>
<input type="text" class="form-control" name="app_name" required placeholder="my-awesome-app" pattern="[a-z0-9-]+">
<small class="text-muted">Lowercase letters, numbers, hyphens only. Example: cloud-dashboard</small>
</div>
<div class="mb-3">
<label class="form-label fw-bold">App Description</label>
<textarea class="form-control" name="app_description" required rows="4" placeholder="Describe what your app does in 2 to 3 sentences"></textarea>
</div>
<button type="submit" class="btn btn-success w-100" id="submitBtn">🚀 Generate and Deploy</button>
<div id="loadingDiv" class="text-center mt-3" style="display:none">
<div class="spinner-border text-success" role="status"></div>
<p class="mt-2 text-muted">Creating your app... This takes about 30 seconds</p>
</div>
</form>
</div>
</div>
</div>
</div>
</div>
<footer class="text-center mt-5 pb-4 text-muted small">
App Factory - Venkata Srinivas Kantamneni - USPTO Patent 19/325718
</footer>
<script>
function showLoading() {
document.getElementById('submitBtn').disabled = true;
document.getElementById('submitBtn').textContent = 'Creating your app...';
document.getElementById('loadingDiv').style.display = 'block';
}
</script>
</body>
</html>
